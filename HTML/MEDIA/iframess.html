<!DOCTYPE html>
<html>
<head>
  <title>Embedded Frame Example</title>
</head>
<body>

  <h2>Embedded Frame (iframe) Example</h2>

  <p>Below is an embedded webpage using iframe:</p>

  <!-- Embedding another site -->
  <iframe src="https://www.wikipedia.org" width="600" height="400" title="Wikipedia"></iframe>

  <hr>

  <p>Embedding a local HTML file (content.html):</p>

  <!-- Embedding local page -->
  <iframe src="contentttt.html" width="500" height="300"></iframe>

</body>
</html>
