<!DOCTYPE html>
<html>
<head>
  <title>Embedded Images Example</title>
</head>
<body>

  <h2>Embedded Images in HTML</h2>

  <!-- Local Image -->
  <p>This is a local image:</p>
  <img src="flower.jpg" alt="My Logo" width="200" height="150">

  <hr>

  <!-- Online Image -->
  <p>This is an image from the web:</p>
  <img src="https://images.pexels.com/photos/1704488/pexels-photo-1704488.jpeg?auto=compress&cs=tinysrgb&dpr=1&w=500" alt="Girl Image" width="250" height="200">

  <hr>

  <!-- Image with link -->
  <p>Clicking the image will open Google:</p>
  <a href="https://www.google.com">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_160x56dp.png" alt="Google Logo">
  </a>

</body>
</html>
