<!DOCTYPE html>
<html>
<head>
<title>Login Form</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f2027;
}

.box{
    width:300px;
    padding:30px;
    background:#1c1c1c;
    color:white;
    border-radius:10px;
    box-shadow:0 0 20px cyan;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:cyan;
    cursor:pointer;
}

button:hover{
    background:white;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
