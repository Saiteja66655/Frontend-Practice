<!DOCTYPE html>
<html>
<head>
<title>Advanced Form</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

form{
    background:white;
    padding:25px;
    border-radius:10px;
    width:300px;
    box-shadow:0 0 15px black;
}

h2{
    text-align:center;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid gray;
}

button{
    width:100%;
    padding:10px;
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:black;
}

</style>

</head>

<body>

<form>

<h2>Registration</h2>

<input type="text" placeholder="Name">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<select>
<option>Male</option>
<option>Female</option>
</select>

<input type="date">

<button>Submit</button>

</form>

</body>
</html>
