<!DOCTYPE html>
<html>
<head>
  <title>Table Example</title>
  <style>
    table, th, td {
      border: 5px solid black;
      border-collapse: collapse;
      padding: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Table with Rowspan and Colspan</h2>

  <table>
    <tr>
      <th rowspan="2">Name</th>
      <th colspan="2">Marks</th>
    </tr>
    <tr>
      <th>Maths</th>
      <th>Science</th>
    </tr>
    <tr>
      <td>Ravi</td>
      <td>85</td>
      <td>90</td>
    </tr>
    <tr>
      <td>Sita</td>
      <td>78</td>
      <td>88</td>
    </tr>
  </table>
</body>
</html>
