<!DOCTYPE html>
<html>
<head>
  <title>Table of Images</title>
  <style>
    table, td {
      border: 1px solid black;
      border-collapse: collapse;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h2>Table of Images</h2>
  
  <table>
    <tr>
      <td><img src="flower.jpg" alt="Image 1" width="150" height="100"></td>
      <td><img src="flower.jpg" alt="Image 2" width="150" height="100"></td>
    </tr>
    <tr>
      <td><img src="flower.jpg" alt="Image 3" width="150" height="100"></td>
      <td><img src="flower.jpg" alt="Image 4" width="150" height="100"></td>
    </tr>
  </table>
</body>
</html>
