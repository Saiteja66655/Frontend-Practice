<!DOCTYPE html>
<html>
<head>
  <title>Rowspan and Colspan Example</title>
</head>
<body>

<h3>Rowspan and Colspan Demo</h3>

<table border="1">

  <!-- Colspan -->
  <tr>
    <th colspan="3">Student Information</th>
  </tr>

  <tr>
    <th>Name</th>
    <th>Subject</th>
    <th>Marks</th>
  </tr>

  <!-- Rowspan -->
  <tr>
    <td rowspan="2">Ravi</td>
    <td>Math</td>
    <td>85</td>
  </tr>

  <tr>
    <td>Science</td>
    <td>90</td>
  </tr>

</table>

</body>
</html>
