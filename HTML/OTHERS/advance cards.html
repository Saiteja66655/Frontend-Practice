<!DOCTYPE html>
<html>
<head>
<title>Advanced Cards</title>

<style>

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

.card{
    width:250px;
    height:300px;
    background:#222;
    color:white;
    border-radius:15px;
    overflow:hidden;
    transition:0.5s;
    box-shadow:0 0 20px black;
}

.card:hover{
    transform:scale(1.1) rotate(3deg);
}

.card img{
    width:100%;
    height:150px;
}

.content{
    padding:15px;
}

button{
    padding:8px 15px;
    border:none;
    background:cyan;
    cursor:pointer;
}

button:hover{
    background:white;
}

</style>

</head>
<body>

<div class="card">

<img src="https://picsum.photos/300/200">

<div class="content">
<h3>Product</h3>
<p>Advanced hover card</p>
<button>Buy</button>
</div>

</div>

</body>
</html>
